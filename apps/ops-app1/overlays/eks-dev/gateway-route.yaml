# apps/ops-app1/overlays/eks-dev/gateway-route.yaml
---
# LoadBalancerConfiguration — ALB 본체 설정
apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: ops-app1-lb-config
  namespace: ops-app1-eks-dev
spec:
  scheme: internet-facing
---
# TargetGroupConfiguration — Target Group 설정
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: ops-app1-tg-config
  namespace: ops-app1-eks-dev
spec:
  targetReference:
    name: ops-app1
  defaultConfiguration:
    targetType: ip
    healthCheckConfig:
      healthCheckPath: /actuator/health/liveness
      healthCheckPort: traffic-port
      healthCheckInterval: 15
      healthyThresholdCount: 2
      unhealthyThresholdCount: 3
---
# Gateway — ALB 인스턴스 트리거
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ops-app1-gateway
  namespace: ops-app1-eks-dev
spec:
  gatewayClassName: aws-alb # 사전 생성한 GatewayClass
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: ops-app1-lb-config
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# HTTPRoute — / → ops-app1:8080
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ops-app1-route
  namespace: ops-app1-eks-dev
spec:
  parentRefs:
    - name: ops-app1-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ops-app1
          port: 8080
          weight: 100
