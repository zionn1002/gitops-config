apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- external-secret.yaml
- gateway-route.yaml

namespace: ops-app1-eks-dev

images:
- name: ops-app1
  newName: 984126995517.dkr.ecr.ap-northeast-2.amazonaws.com/ops-app1
  newTag: sha-f37a429

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: ops-app1
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 1Gi
  target:
    kind: Deployment
    name: ops-app1
- patch: "- op: add\n  path: /spec/template/spec/containers/0/envFrom/-\n  value:
    \n    secretRef:\n      name: ops-app1-secrets"
  target:
    kind: Deployment
    name: ops-app1

configMapGenerator:
- behavior: merge
  literals:
  - PROFILE=eks-dev
  - OPS_APP2_URL=http://ops-app2.ops-app2-eks-dev.svc.cluster.local:8081
  name: ops-app1-config
