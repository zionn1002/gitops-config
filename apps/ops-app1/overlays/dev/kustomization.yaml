apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

namespace: ops-app1-dev

images:
- name: ops-app1

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: ops-app1

configMapGenerator:
- behavior: merge
  literals:
  - PROFILE=dev
  - OPS_APP2_URL=http://ops-app2.ops-app2-dev.svc.cluster.local:8081
  name: ops-app1-config
