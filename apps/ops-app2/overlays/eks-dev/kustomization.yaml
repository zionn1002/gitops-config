apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - external-secret.yaml
  - gateway-route.yaml # Gateway API 매니페스트 (ops-app2만)

namespace: ops-app2-eks-dev

images:
  - name: ops-app2
    newName: <aws-account-id>.dkr.ecr.ap-northeast-2.amazonaws.com/ops-app2
    newTag: "sha-placeholder" # CI가 자동 업데이트

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: ops-app2
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
    target:
      kind: Deployment
      name: ops-app2
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value: 
          secretRef:
            name: ops-app2-secrets
    target:
      kind: Deployment
      name: ops-app2

configMapGenerator:
  - name: ops-app2-config
    behavior: merge
    literals:
      - PROFILE=eks-dev
      - OPS_APP2_URL=http://ops-app2.ops-app2-eks-dev.svc.cluster.local:8081
